name: Build installers

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"
  pull_request:
    branches:
      - main
      - master

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            name: mac
            artifact: mac-build
          - os: windows-latest
            name: win
            artifact: windows-build
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npm run model:fr
      - name: Build (verbose)
        shell: bash
        env:
          DEBUG: electron-builder,electron-builder:*
          ELECTRON_BUILDER_LOG_LEVEL: debug
        run: |
          if [[ "${{ matrix.name }}" == "mac" ]]; then
            npx electron-builder --mac dmg --publish never
          else
            npx electron-builder --win nsis --publish never
          fi
      - name: Show dist contents
        shell: bash
        run: |
          ls -la dist || true
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          if-no-files-found: error
          path: |
            dist/*.dmg
            dist/*.dmg.blockmap
            dist/latest*.yml
            dist/*.exe
            dist/*.exe.blockmap
            dist/*.msi
            dist/*.zip
            dist/builder-debug.yml

